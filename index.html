<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#11100f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TraceLens">
  <meta name="description" content="Overlay a picture on your camera to trace it onto paper.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles.css">
  <title>TraceLens</title>
</head>
<body>
  <main class="app" id="app">
    <video id="camera" autoplay muted playsinline aria-label="Live rear camera"></video>
    <div class="camera-shade" aria-hidden="true"></div>

    <section class="stage" id="stage" aria-label="Tracing area">
      <img id="overlay" alt="Picture selected for tracing" draggable="false" hidden>
      <div class="welcome" id="welcome">
        <div class="welcome-icon" aria-hidden="true">✦</div>
        <h1>TraceLens</h1>
        <p>Place your phone above the paper, then choose a picture to trace.</p>
      </div>
    </section>

    <div class="top-bar">
      <div class="brand"><span class="brand-mark">✦</span> TraceLens</div>
      <div class="status" id="awakeStatus"><span></span> Screen awake</div>
    </div>

    <section class="controls" id="controls" aria-label="Tracing controls">
      <button class="collapse-button" id="collapseButton" type="button" aria-label="Hide controls" aria-expanded="true">⌄</button>
      <div class="controls-body">
        <div class="opacity-row" id="opacityRow" hidden>
          <label for="opacity">Opacity</label>
          <input id="opacity" type="range" min="5" max="100" value="55">
          <output id="opacityValue" for="opacity">55%</output>
        </div>

        <div class="action-row" id="imageActions" hidden>
          <button class="secondary lock-button" id="lockButton" type="button" aria-pressed="false">◇ Lock</button>
          <button class="secondary" id="resetButton" type="button">Reset</button>
          <button class="secondary danger" id="removeButton" type="button">Remove</button>
        </div>

        <div class="picker-row">
          <button class="camera-button" id="cameraButton" type="button">Start camera</button>
          <label class="primary-button" for="imagePicker">
            <span id="pickerLabel">Choose picture</span>
            <input id="imagePicker" type="file" accept="image/*">
          </label>
        </div>
        <p class="hint" id="hint">Your picture stays on this device.</p>
      </div>
    </section>

    <div class="notice" id="notice" role="status" aria-live="polite" hidden></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
